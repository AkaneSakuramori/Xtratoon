<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - Anime Adventure</title>
    <style>
        /* Font loading - Download Equinox-Regular.ttf from https://www.fontspace.com/equinox-font-f111640 and place in the same folder */
        @font-face {
            font-family: 'Equinox';
            src: url('Equinox-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            font-family: 'Equinox', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            padding: 20px;
            animation: fadeIn 2s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 4rem;
            font-weight: normal;
            margin: 0 0 1rem 0;
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.5rem;
            margin: 0 0 2rem 0;
            opacity: 0.9;
            font-weight: 300;
        }

        .dancer {
            width: 300px;
            height: auto;
            max-width: 100%;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
            animation: bounce 1.5s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            40% {
                transform: translateY(-15px) rotate(2deg);
            }
            60% {
                transform: translateY(-8px) rotate(-2deg);
            }
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            p {
                font-size: 1.2rem;
            }
            .dancer {
                width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Coming Soon</h1>
        <p>Our epic anime universe is loading... Stay tuned for dances, stories, and waifus!</p>
        <img src="https://i.imgur.com/JluUY98.gif" alt="Dancing Anime Girls" class="dancer">
    </div>
</body>
</html>
