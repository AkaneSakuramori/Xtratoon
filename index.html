<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMING SOON</title>
    
    <!-- Equinox font (same as before) -->
    <style>
        @font-face {
            font-family: 'Equinox';
            src: url('Equinox-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(circle at 50% 30%, #3a0a5a 0%, #0a0a1f 70%);
            color: #fff;
            font-family: 'Equinox', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* subtle moving neon overlay */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, rgba(255,0,255,0.08), rgba(0,255,255,0.06));
            animation: neonShift 25s linear infinite;
            pointer-events: none;
        }

        @keyframes neonShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
            z-index: 2;
        }

        .left {
            text-align: center;
        }

        h1 {
            font-size: clamp(4rem, 12vw, 9rem);
            line-height: 0.85;
            font-weight: 900;
            letter-spacing: -8px;
            text-transform: uppercase;
            text-shadow: 
                0 0 30px #ff00ff,
                0 0 60px #ff00ff,
                0 0 100px #00ffff,
                0 0 140px #ff00ff;
            animation: titleGlow 4s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { text-shadow: 0 0 30px #ff00ff, 0 0 60px #ff00ff; }
            to   { text-shadow: 0 0 50px #ff00ff, 0 0 90px #00ffff, 0 0 140px #ff00ff; }
        }

        .right {
            display: flex;
            justify-content: center;
        }

        .dancer {
            width: 100%;
            max-width: 520px;
            border-radius: 32px;
            box-shadow: 0 0 100px rgba(255, 20, 147, 0.7),
                        0 0 180px rgba(0, 255, 255, 0.4);
            animation: floatDance 8s ease-in-out infinite;
        }

        @keyframes floatDance {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50%      { transform: translateY(-35px) rotate(4deg); }
        }

        /* mobile */
        @media (max-width: 992px) {
            .container {
                grid-template-columns: 1fr;
                gap: 40px;
                text-align: center;
            }
            h1 { letter-spacing: -4px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LEFT: Professional text -->
        <div class="left">
            <h1>COMING SOON</h1>
        </div>

        <!-- RIGHT: Dancing anime girl -->
        <div class="right">
            <img src="https://i.giphy.com/media/26BRv0R5t3z8w/giphy.gif" 
                 alt="Dancing Anime Girl" 
                 class="dancer">
        </div>
    </div>
</body>
</html>
