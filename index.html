<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMING SOON</title>
    <style>
        @font-face {
            font-family: 'Equinox';
            src: url('Equinox-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #fff;
            font-family: 'Equinox', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .title {
            font-size: clamp(4.5rem, 18vw, 13rem);
            line-height: 0.78;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: -0.06em;
            font-weight: 400;
            z-index: 10;
            text-shadow: 0 0 60px rgba(255,255,255,0.25);
        }

        .title div { margin: -1.2vw 0; }

        /* Glassmorphic panels (angled like your reference image) */
        .glass-panel {
            position: absolute;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7),
                        inset 0 0 40px rgba(255, 255, 255, 0.08);
            z-index: 5;
        }

        .glass1 { top: 8%; left: -5%; width: 52%; height: 38%; transform: rotate(-24deg); }
        .glass2 { top: 22%; right: -8%; width: 48%; height: 52%; transform: rotate(19deg); }
        .glass3 { bottom: 12%; left: 15%; width: 36%; height: 28%; transform: rotate(-38deg); }

        /* Anime girl glass card */
        .glass-card {
            position: absolute;
            bottom: 9%;
            right: 7%;
            width: 290px;
            padding: 18px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 105, 180, 0.25);
            border-radius: 24px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.75),
                        0 0 40px rgba(255, 20, 147, 0.3);
            z-index: 15;
            animation: floatGirl 7s ease-in-out infinite;
        }

        .dancer {
            width: 100%;
            border-radius: 16px;
            display: block;
        }

        @keyframes floatGirl {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-22px) rotate(3deg); }
        }

        /* Small poster-style text */
        .corner-text {
            position: absolute;
            font-size: 0.95rem;
            opacity: 0.6;
            letter-spacing: 1px;
            z-index: 20;
        }

        .top-right { top: 6%; right: 6%; text-align: right; }
        .bottom-left { bottom: 6%; left: 6%; }

        /* Mobile tweaks */
        @media (max-width: 768px) {
            .title { font-size: clamp(3.2rem, 15vw, 7rem); }
            .glass-card { width: 220px; bottom: 6%; right: 5%; }
            .glass1, .glass2, .glass3 { opacity: 0.85; }
        }
    </style>
</head>
<body>
    <!-- Glass panels -->
    <div class="glass-panel glass1"></div>
    <div class="glass-panel glass2"></div>
    <div class="glass-panel glass3"></div>

    <!-- Main title - exactly like your image -->
    <div class="title">
        <div>COM</div>
        <div>ING</div>
        <div>SOON</div>
    </div>

    <!-- Anime girl in glass card -->
    <div class="glass-card">
        <img src="https://i.giphy.com/media/26BRv0R5t3z8w/giphy.gif" 
             alt="Dancing Anime Girl" 
             class="dancer">
    </div>

    <!-- Small text like your reference poster -->
    <div class="corner-text top-right">
        ANIME UNIVERSE<br>
        <span style="font-size:0.8rem;">EST. 2024</span>
    </div>
    <div class="corner-text bottom-left">
        YOUR DOMAIN<br>
        WAIFUS LOADING...
    </div>
</body>
</html>
