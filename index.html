<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMING SOON</title>
    <style>
        @font-face {
            font-family: 'Equinox';
            src: url('Equinox-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            background: #05050f;
            font-family: 'Equinox', system-ui, sans-serif;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* NEW working GIF (blurred background) */
        .bg {
            position: absolute;
            inset: 0;
            background: url('https://i.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif') center/cover no-repeat;
            filter: blur(28px) brightness(0.45) saturate(1.4);
            z-index: 1;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(5, 5, 15, 0.78);
            z-index: 2;
        }

        .frame {
            position: relative;
            z-index: 3;
            width: 92%;
            max-width: 920px;
            height: 92%;
            max-height: 620px;
            border: 2px solid rgba(255, 255, 255, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 40px;
        }

        .eye {
            width: 82px;
            margin-bottom: 28px;
        }

        .revealing {
            font-size: 1.3rem;
            letter-spacing: 8px;
            opacity: 0.85;
            margin-bottom: 12px;
        }

        h1 {
            font-size: clamp(5rem, 14vw, 10.5rem);
            line-height: 0.82;
            letter-spacing: -10px;
            text-transform: uppercase;
            text-shadow: 0 0 40px #ff00ff, 0 0 80px #ff00ff;
            margin-bottom: 60px;
        }

        .btn {
            padding: 18px 68px;
            font-size: 1.15rem;
            letter-spacing: 6px;
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .btn:hover {
            background: #ff00ff;
            border-color: #ff00ff;
            box-shadow: 0 0 40px #ff00ff;
            transform: scale(1.05);
        }

        .tagline {
            position: absolute;
            bottom: 48px;
            font-size: 1.05rem;
            opacity: 0.75;
            letter-spacing: 3px;
        }

        @media (max-width: 768px) {
            .frame { padding: 40px 20px; height: 96%; }
            h1 { letter-spacing: -6px; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="overlay"></div>

    <div class="frame">
        <!-- Anime-style slashed eye -->
        <svg class="eye" viewBox="0 0 140 80" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M70 22 Q38 42 70 62 Q102 42 70 22" stroke="#ffffff" stroke-width="9" stroke-linejoin="round"/>
            <circle cx="70" cy="42" r="13" stroke="#ffffff" stroke-width="7"/>
            <line x1="28" y1="18" x2="112" y2="64" stroke="#ff00ff" stroke-width="10" stroke-linecap="round"/>
        </svg>

        <div class="revealing">REVEALING SOON</div>
        <h1>COMING SOON</h1>
        
        <button class="btn" onclick="alert('Notify me when it drops! 🚀')">STAY TUNED</button>

        <div class="tagline">Something intresting awaits...</div>
    </div>
</body>
</html>
